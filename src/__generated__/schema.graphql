# Importação de pedido por arquivo (PDF/Excel) — fluxo determinístico v1:
# extrair grade → mapear colunas (front) → preview/casamento → revisar → confirmar.

input ExtractOrderFileInput {
  # orderId: usa a receita do template ativo da fábrica do pedido (wizard).
  orderId: UUID = null
  # recipe: receita avulsa (config do template) para pré-visualização na tela de
  # modelo da fábrica, quando ainda não há template salvo.
  recipe: JSON = null
  fileName: String!
  fileBase64: String!
}

# Item já estruturado por uma receita determinística (quando há template/recipe).
type OrderImportFileItemType {
  sku: String!
  name: String
  quantity: Decimal!
  unitPrice: Decimal
  # Valores "R$" do item (multiline): a tela deixa escolher o preço unitário.
  priceOptions: [String!]!
}

type OrderImportGridType {
  fileType: String!
  # Grade crua (quando NÃO há receita): o front mapeia as colunas.
  rows: [[String!]!]!
  # Itens já extraídos (quando há receita): pula a etapa de mapeamento.
  items: [OrderImportFileItemType!]
  # Preset detectado automaticamente (quando recipe.preset = "auto").
  detectedPreset: String
  # Descrições das linhas com cara de produto que NÃO puderam ser lidas (código
  # embaralhado por texto sobreposto no PDF) e foram descartadas. O front lista
  # para o usuário achar no PDF. null/[] = não se aplica / nenhuma.
  unreadableRows: [String!]
}

