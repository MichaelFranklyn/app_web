"""Imposto de um produto na planilha. RATE: alíquota aditiva simples. ST_MVA: ST calculado por MVA — informe mva, icmsCreditRate e internalRate (alíquota interna)."""
input ImportPriceTaxInput {
  name: String!
  calcType: TaxCalcType! = RATE
  rate: Decimal = null
  mva: Decimal = null
  icmsCreditRate: Decimal = null
  internalRate: Decimal = null
}

input ImportPriceListRowInput {
  sku: String!
  name: String!
  """Vazio/null usa a categoria padrão "Geral"."""
  category: String = null
  """Vazio/null usa a unidade padrão "Unidade"."""
  unit: String = null
  """Vazio/null usa o rótulo padrão "Unidade" (venda avulsa)."""
  unitLabel: String = null
  unitPerPack: Decimal!
  """Múltiplo de venda não veio na planilha e foi assumido como 1; marca o produto como "Precisa de atenção"."""
  packDefaulted: Boolean! = false
  ncm: String = null
  ipiRate: Decimal = null
  """Demais impostos do produto (ICMS, ST...); aplicados além do ipiRate."""
  taxes: [ImportPriceTaxInput!] = []
  prices: [ImportPriceCellInput!]!
}

input ImportFactoryPriceListInput {
  companyFactoryId: UUID!
  listName: String!
  """Escopo regional/fiscal da tabela importada (ex: "NORDESTE", "ICMS 7%"); "" = tabela geral."""
  region: String! = ""
  validFrom: Date!
  validUntil: Date = null
  tiers: [String!]!
  importIpi: Boolean! = false
  """IPI da planilha está em fração decimal (0.0325 = 3,25%); convertido para percentual multiplicando por 100."""
  ipiAsFraction: Boolean! = false
  """Alíquotas de `taxes` (rate/mva/icmsCreditRate/internalRate) em fração decimal (0.205 = 20,5%); convertidas para percentual."""
  taxesAsFraction: Boolean! = false
  """Preços da planilha são por unidade base (peça/kg); convertidos para preço por embalagem multiplicando por unitPerPack."""
  pricesPerUnit: Boolean! = false
  rows: [ImportPriceListRowInput!]!
}

type ImportPriceRowDetail {
  row: Int!
  sku: String!
  message: String!
}

type ImportPriceListResult {
  listName: String!
  """Total de linhas enviadas (= linhas lidas/revisadas da planilha)."""
  totalRows: Int!
  tiers: Int!
  productsCreated: Int!
  productsReused: Int!
  pricesSet: Int!
  failed: Int!
  """Produtos importados com aviso (novo, múltiplo assumido, sem preço): entram marcados "Precisa de atenção"."""
  attention: Int!
  errors: [ImportPriceRowDetail!]!
}

