"""Forma de cálculo do imposto. RATE: alíquota aditiva simples. ST_MVA: substituição tributária — na precificação o ST é calculado com o IPI do produto na base: base × (1+IPI) × (1+MVA) × alíquota interna − base × crédito de ICMS."""
enum TaxCalcType {
  RATE
  ST_MVA
}

"""Componentes do ST por MVA (percentuais, ex: 20.5 = 20,5%)."""
input StMvaParamsInput {
  mva: Decimal!
  icmsCreditRate: Decimal!
  internalRate: Decimal!
}

input CreateProductTaxInput {
  productId: UUID!
  taxRuleId: UUID!
  calcType: TaxCalcType! = RATE
  """Obrigatório para RATE; ignorado para ST_MVA (derivado dos params)."""
  rate: Decimal = null
  """Obrigatório para ST_MVA."""
  params: StMvaParamsInput = null
}

input UpdateProductTaxInput {
  calcType: TaxCalcType = null
  rate: Decimal = null
  params: StMvaParamsInput = null
}

type ProductTaxType {
  id: UUID!
  productId: UUID!
  taxRuleId: UUID!
  """Alíquota aditiva (percentual). Para ST_MVA é a nominal (sem IPI, igual à coluna ST das planilhas); a precificação usa os params com IPI na base."""
  rate: Decimal!
  calcType: TaxCalcType!
  params: JSON
