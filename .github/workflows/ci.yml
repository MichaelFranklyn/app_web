name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Necessária em build/runtime: helpersCookie.ts lança se ela não existir.
# Valor dummy — os testes E2E mockam o GraphQL e não validam o token.
env:
  NEXT_PUBLIC_COOKIE_SECRET_KEY: ci-e2e-cookie-secret

jobs:
  unit:
    name: Lint + Unit (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # webServer faz o build de produção isolado e sobe o app; globalSetup sobe
      # o stub GraphQL. CI=true (automático) força reuseExistingServer:false.
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
